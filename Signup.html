<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo-box">
      <img src="Logo.png" alt="School Logo">
    </div>
    <h1>NEW VISION ACADEMY</h1>
  </nav>

  <!-- Page -->
  <main class="page">

    <form class="signup-form">
      <h2>Create Account</h2>

      <input type="text" placeholder="Enter your first name" required>

      <input type="text" placeholder="Enter your last name" required>

      <input type="text" placeholder="Enter your location" required>

      <input type="email" placeholder="Enter your email" required>

      <select required>
        <option value="">Select your gender</option>
        <option>Male</option>
        <option>Female</option>
      
      </select>

      <input type="date" required>

      <div class="password-box">
        <input type="password" id="password" placeholder="Enter your password" required>
        <button type="button" onclick="togglePassword('password')">👁</button>
      </div>

      <div class="password-box">
        <input type="password" id="repassword" placeholder="Repeat your password" required>
        <button type="button" onclick="togglePassword('repassword')">👁</button>
      </div>

      <button class="submit-btn">Sign Up</button>
    </form>

    <p class="login-link">
      Already have an account?
      <a href="Login.html">Login</a>
    </p>

  </main>

<script>
  function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
  }
</script>

</body>
</html>
